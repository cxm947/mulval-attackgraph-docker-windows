services:
  mulval:
    image: ${MULVAL_IMAGE:-wilbercui/mulval}
    container_name: ${MULVAL_CONTAINER:-mulval-attackgraph}
    working_dir: /input
    volumes:
      - ${MULVAL_MOUNT_DIR:-F:/mulval-docker}:/input
    command: bash -lc "/root/startSql.bash; tail -f /dev/null"
    stdin_open: true
    tty: true
